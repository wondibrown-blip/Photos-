<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Louzhen Vault</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fbf6f6;
            touch-action: manipulation; /* Optimasi respon sentuhan di HP */
            -webkit-tap-highlight-color: transparent;
        }
        .serif-font {
            font-family: 'Playfair Display', serif;
        }
        /* Custom scrollbar untuk estetika */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #fbf6f6;
        }
        ::-webkit-scrollbar-thumb {
            background: #e9d5d5;
            border-radius: 10px;
        }
    </style>
</head>
<body class="text-neutral-800 pb-24">

    <header class="sticky top-0 z-40 bg-[#fbf6f6]/90 backdrop-blur-md border-b border-rose-100/50 px-4 py-3 flex justify-between items-center">
        <h1 id="app-logo" class="serif-font text-xl font-semibold tracking-wide text-rose-800 cursor-pointer select-none">
            Louzhen Vault
        </h1>
        <div id="admin-badge" class="hidden bg-rose-100 text-rose-700 text-xs px-2.5 py-1 rounded-full font-medium border border-rose-200">
            <i class="fa-solid fa-user-gear mr-1"></i> Admin
        </div>
    </header>

    <div class="px-4 mt-6">
        <div class="bg-rose-100/40 p-1.5 rounded-2xl flex gap-1 border border-rose-100">
            <button id="tab-photos-btn" class="flex-1 py-2.5 text-sm font-medium rounded-xl transition-all duration-300 bg-white text-rose-800 shadow-sm">
                <i class="fa-regular fa-images mr-1.5"></i> Photos
            </button>
            <button id="tab-playlists-btn" class="flex-1 py-2.5 text-sm font-medium rounded-xl transition-all duration-300 text-rose-600 hover:text-rose-800">
                <i class="fa-solid fa-music mr-1.5"></i> Playlists
            </button>
        </div>
    </div>

    <main class="px-4 mt-6">
        
        <section id="photos-section" class="block">
            <div class="flex justify-between items-center mb-4">
                <h2 class="serif-font text-lg font-medium text-rose-900">Recent Snaps</h2>
                <button id="btn-add-photo" class="hidden bg-rose-800 hover:bg-rose-900 text-white text-xs px-3.5 py-2 rounded-xl font-medium transition-all shadow-sm">
                    <i class="fa-solid fa-plus mr-1"></i> Add Snap
                </button>
            </div>
            
            <div id="photos-grid" class="grid grid-cols-2 gap-4">
                <div class="col-span-2 text-center py-12 text-neutral-400 text-sm">
                    <i class="fa-solid fa-circle-notch animate-spin text-rose-300 text-xl mb-2"></i>
                    <p>Fetching memories...</p>
                </div>
            </div>
        </section>

        <section id="playlists-section" class="hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="serif-font text-lg font-medium text-rose-900">Our Playlists</h2>
                <button id="btn-add-playlist" class="hidden bg-rose-800 hover:bg-rose-900 text-white text-xs px-3.5 py-2 rounded-xl font-medium transition-all shadow-sm">
                    <i class="fa-solid fa-plus mr-1"></i> New Playlist
                </button>
            </div>

            <div id="playlists-list" class="space-y-3">
                <div class="text-center py-12 text-neutral-400 text-sm">
                    <i class="fa-solid fa-circle-notch animate-spin text-rose-300 text-xl mb-2"></i>
                    <p>Setting up the jukebox...</p>
                </div>
            </div>
        </section>

    </main>

    <div id="audio-player-bar" class="fixed bottom-4 left-4 right-4 bg-white/95 backdrop-blur-md border border-rose-100 shadow-xl rounded-2xl p-3 flex items-center justify-between transition-all duration-500 transform translate-y-32 z-50">
        <div class="flex items-center gap-3 overflow-hidden flex-1 mr-3">
            <div class="w-10 h-10 bg-rose-50 rounded-xl flex items-center justify-center border border-rose-100 flex-shrink-0">
                <i class="fa-solid fa-music text-rose-400 text-sm animate-pulse"></i>
            </div>
            <div class="overflow-hidden">
                <p id="player-track-name" class="text-xs font-semibold text-neutral-800 truncate">Song Title</p>
                <p id="player-playlist-name" class="text-[10px] text-neutral-400 truncate">Playlist Name</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button id="player-play-btn" class="w-9 h-9 bg-rose-50 hover:bg-rose-100 text-rose-800 rounded-full flex items-center justify-center transition-all">
                <i class="fa-solid fa-play"></i>
            </button>
            <button id="player-close-btn" class="w-7 h-7 text-neutral-300 hover:text-neutral-500 flex items-center justify-center transition-all">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <audio id="main-audio-element" class="hidden"></audio>
    </div>

    <div id="input-modal" class="fixed inset-0 bg-neutral-950/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-md rounded-2xl p-6 shadow-2xl border border-rose-50 animate-in fade-in zoom-in-95 duration-200">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modal-title" class="serif-font text-lg font-semibold text-rose-900">Form</h3>
                <button id="btn-close-modal" class="text-neutral-400 hover:text-neutral-600 p-1">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <form id="vault-form" class="space-y-4">
                <input type="hidden" id="form-type">
                <input type="hidden" id="form-extra-id"> <div id="field-container" class="space-y-4">
                    </div>

                <button type="submit" class="w-full py-3 bg-rose-800 hover:bg-rose-900 text-white rounded-xl font-medium text-sm transition-all shadow-sm">
                    Submit Data
                </button>
            </form>
        </div>
    </div>


    <script>
        // 1. TELEGRAM WEB APP INITIALIZATION
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand(); // Memaksa Mini App memenuhi tinggi layar Telegram
        }

        // 2. SUPABASE CREDENTIALS (GANTI DENGAN KUNCI MILIKMU!)
        const SUPABASE_URL = "https://fhfjfwplicgzpbtncjyw.supabase.co/rest/v1/"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZoZmpmd3BsaWNnenBidG5janl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzkwMTMsImV4cCI6MjA5OTU1NTAxM30.6-_O92a3w83OqYZDh-N2twnZOF6yFi8YdOQSM5jO4lA";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // State Aplikasi
        let isAdmin = false;
        let activeTab = 'photos';
        let currentAudio = document.getElementById('main-audio-element');

        // DOM Elements
        const tabPhotosBtn = document.getElementById('tab-photos-btn');
        const tabPlaylistsBtn = document.getElementById('tab-playlists-btn');
        const photosSection = document.getElementById('photos-section');
        const playlistsSection = document.getElementById('playlists-section');
        const appLogo = document.getElementById('app-logo');
        const adminBadge = document.getElementById('admin-badge');
        const btnAddPhoto = document.getElementById('btn-add-photo');
        const btnAddPlaylist = document.getElementById('btn-add-playlist');
        
        // Modal & Form Elements
        const inputModal = document.getElementById('input-modal');
        const btnCloseModal = document.getElementById('btn-close-modal');
        const vaultForm = document.getElementById('vault-form');
        const modalTitle = document.getElementById('modal-title');
        const fieldContainer = document.getElementById('field-container');
        const formType = document.getElementById('form-type');
        const formExtraId = document.getElementById('form-extra-id');

        // Audio Player Elements
        const audioPlayerBar = document.getElementById('audio-player-bar');
        const playerTrackName = document.getElementById('player-track-name');
        const playerPlaylistName = document.getElementById('player-playlist-name');
        const playerPlayBtn = document.getElementById('player-play-btn');
        const playerCloseBtn = document.getElementById('player-close-btn');

        // UTILITY: Sentuhan Responsif Khusus Mobile/Telegram
        function bindEvent(element, callback) {
            if (!element) return;
            let touchMoved = false;
            
            element.addEventListener('touchmove', () => { touchMoved = true; });
            element.addEventListener('touchend', (e) => {
                if (!touchMoved) {
                    e.preventDefault();
                    callback(e);
                }
                touchMoved = false;
            });
            element.addEventListener('click', (e) => {
                callback(e);
            });
        }

        // 3. ADMIN TRIGGERS (Ketuk Judul 10 Kali)
        let clickCount = 0;
        bindEvent(appLogo, () => {
            clickCount++;
            if (clickCount === 10) {
                const name = prompt("Enter passcode or Admin Name to unlock editor features:");
                if (name && name.trim() !== "") {
                    isAdmin = true;
                    adminBadge.classList.remove('hidden');
                    btnAddPhoto.classList.remove('hidden');
                    btnAddPlaylist.classList.remove('hidden');
                    alert(`Welcome back, Admin ${name}! Editor mode is unlocked.`);
                    renderPhotos();
                    renderPlaylists();
                }
                clickCount = 0;
            }
        });

        // 4. TAB SWITCH LOGIC
        bindEvent(tabPhotosBtn, () => {
            activeTab = 'photos';
            tabPhotosBtn.className = "flex-1 py-2.5 text-sm font-medium rounded-xl transition-all duration-300 bg-white text-rose-800 shadow-sm";
            tabPlaylistsBtn.className = "flex-1 py-2.5 text-sm font-medium rounded-xl transition-all duration-300 text-rose-600 hover:text-rose-800";
            photosSection.classList.remove('hidden');
            playlistsSection.classList.add('hidden');
            renderPhotos();
        });

        bindEvent(tabPlaylistsBtn, () => {
            activeTab = 'playlists';
            tabPlaylistsBtn.className = "flex-1 py-2.5 text-sm font-medium rounded-xl transition-all duration-300 bg-white text-rose-800 shadow-sm";
            tabPhotosBtn.className = "flex-1 py-2.5 text-sm font-medium rounded-xl transition-all duration-300 text-rose-600 hover:text-rose-800";
            playlistsSection.classList.remove('hidden');
            photosSection.classList.add('hidden');
            renderPlaylists();
        });


        // ==========================================
        // 5. DATABASE OPERATIONS (PHOTOS)
        // ==========================================
        async function renderPhotos() {
            const grid = document.getElementById('photos-grid');
            
            try {
                let { data: photos, error } = await supabase
                    .from('photos')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!photos || photos.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-2 text-center py-12 text-neutral-400 text-xs">
                            <i class="fa-regular fa-folder-open text-2xl mb-2 text-rose-200"></i>
                            <p>Vault is empty. Add some photos!</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = photos.map(photo => `
                    <div class="bg-white p-2.5 rounded-2xl shadow-sm border border-rose-100/40 relative group">
                        <div class="aspect-square rounded-xl overflow-hidden bg-neutral-100">
                            <img src="${photo.image_url}" alt="Snap" class="w-full h-full object-cover">
                        </div>
                        <div class="mt-2.5 px-0.5">
                            <p class="text-xs font-semibold text-neutral-800 truncate">${photo.author_name || 'Anonymous'}</p>
                            <p class="text-[10px] text-neutral-400 mt-0.5 leading-relaxed truncate">${photo.note || ''}</p>
                        </div>
                        ${isAdmin ? `
                            <button onclick="deletePhoto(${photo.id})" class="absolute top-4 right-4 bg-red-500/90 text-white w-7 h-7 rounded-full flex items-center justify-center text-xs opacity-90 hover:bg-red-600 transition-all shadow-md">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        ` : ''}
                    </div>
                `).join('');

            } catch (err) {
                grid.innerHTML = `<div class="col-span-2 text-center text-red-400 text-xs py-10">Error loading photos.</div>`;
                console.error(err);
            }
        }

        async function deletePhoto(id) {
            if (confirm("Are you sure you want to delete this snap?")) {
                await supabase.from('photos').delete().eq('id', id);
                renderPhotos();
            }
        }


        // ==========================================
        // 6. DATABASE OPERATIONS (PLAYLISTS & TRACKS)
        // ==========================================
        async function renderPlaylists() {
            const listContainer = document.getElementById('playlists-list');

            try {
                let { data: playlists, error } = await supabase
                    .from('playlists')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!playlists || playlists.length === 0) {
                    listContainer.innerHTML = `
                        <div class="text-center py-12 text-neutral-400 text-xs">
                            <i class="fa-solid fa-compact-disc text-2xl mb-2 text-rose-200"></i>
                            <p>No playlists curated yet.</p>
                        </div>
                    `;
                    return;
                }

                let htmlContent = '';

                for (let pl of playlists) {
                    // Ambil list lagu/tracks untuk masing-masing playlist ini
                    let { data: tracks } = await supabase
                        .from('tracks')
                        .select('*')
                        .eq('playlist_id', pl.id)
                        .order('created_at', { ascending: true });

                    let tracksHtml = '';
                    if (tracks && tracks.length > 0) {
                        tracksHtml = tracks.map(track => `
                            <div class="flex items-center justify-between py-2 border-b border-rose-50/50 last:border-0">
                                <div class="flex items-center gap-3 flex-1 min-w-0 cursor-pointer" onclick="playMusic('${track.name}', '${track.audio_url}', '${pl.name}')">
                                    <div class="w-7 h-7 bg-rose-50/60 rounded-lg flex items-center justify-center text-rose-500 flex-shrink-0">
                                        <i class="fa-solid fa-play text-[10px]"></i>
                                    </div>
                                    <span class="text-xs font-medium text-neutral-700 truncate">${track.name}</span>
                                </div>
                                ${isAdmin ? `
                                    <button onclick="deleteTrack(${track.id})" class="text-neutral-300 hover:text-red-500 p-1 transition-all">
                                        <i class="fa-regular fa-trash-can text-xs"></i>
                                    </button>
                                ` : ''}
                            </div>
                        `).join('');
                    } else {
                        tracksHtml = `<p class="text-[11px] text-neutral-300 py-1 italic">No tracks in this playlist.</p>`;
                    }

                    htmlContent += `
                        <div class="bg-white rounded-2xl p-4 border border-rose-100/40 shadow-sm">
                            <div class="flex justify-between items-center mb-3">
                                <div>
                                    <h3 class="serif-font font-semibold text-rose-900 text-sm">${pl.name}</h3>
                                    <p class="text-[10px] text-neutral-400">by ${pl.creator_name || 'Anonymous'}</p>
                                </div>
                                <div class="flex gap-1.5">
                                    ${isAdmin ? `
                                        <button onclick="openAddTrackModal(${pl.id}, '${pl.name}')" class="bg-rose-50 hover:bg-rose-100 text-rose-800 text-[10px] font-semibold px-2.5 py-1.5 rounded-lg border border-rose-100 transition-all">
                                            + Add Song
                                        </button>
                                        <button onclick="deletePlaylist(${pl.id})" class="text-red-400 hover:text-red-600 p-1.5 text-xs transition-all">
                                            <i class="fa-solid fa-trash-can"></i>
                                        </button>
                                    ` : ''}
                                </div>
                            </div>
                            <div class="bg-rose-50/20 rounded-xl p-3 border border-rose-50/65">
                                ${tracksHtml}
                            </div>
                        </div>
                    `;
                }

                listContainer.innerHTML = htmlContent;

            } catch (err) {
                listContainer.innerHTML = `<div class="text-center text-red-400 text-xs py-10">Error loading playlists.</div>`;
                console.error(err);
            }
        }

        async function deletePlaylist(id) {
            if (confirm("Delete this playlist and all its containing songs?")) {
                await supabase.from('playlists').delete().eq('id', id);
                renderPlaylists();
            }
        }

        async function deleteTrack(id) {
            if (confirm("Remove this song from the playlist?")) {
                await supabase.from('tracks').delete().eq('id', id);
                renderPlaylists();
            }
        }


        // ==========================================
        // 7. MUSIC PLAYER CONTROLLER
        // ==========================================
        function playMusic(trackName, audioUrl, playlistName) {
            currentAudio.src = audioUrl;
            playerTrackName.innerText = trackName;
            playerPlaylistName.innerText = playlistName;

            // Memunculkan player bar dari bawah
            audioPlayerBar.classList.remove('translate-y-32');
            audioPlayerBar.classList.add('translate-y-0');

            // Jalankan player
            currentAudio.play();
            playerPlayBtn.innerHTML = `<i class="fa-solid fa-pause"></i>`;
        }

        bindEvent(playerPlayBtn, () => {
            if (currentAudio.paused) {
                currentAudio.play();
                playerPlayBtn.innerHTML = `<i class="fa-solid fa-pause"></i>`;
            } else {
                currentAudio.pause();
                playerPlayBtn.innerHTML = `<i class="fa-solid fa-play"></i>`;
            }
        });

        bindEvent(playerCloseBtn, () => {
            currentAudio.pause();
            audioPlayerBar.classList.remove('translate-y-0');
            audioPlayerBar.classList.add('translate-y-32');
        });


        // ==========================================
        // 8. FORM MODAL & EVENT SUBMIT
        // ==========================================
        
        // Membuka modal form pengisian Photo
        bindEvent(btnAddPhoto, () => {
            formType.value = "photo";
            modalTitle.innerText = "New Snap";
            fieldContainer.innerHTML = `
                <div>
                    <label class="block text-xs font-semibold text-rose-800 mb-1">Image URL</label>
                    <input type="url" id="input-image-url" required placeholder="https://example.com/image.jpg" class="w-full text-xs px-3.5 py-3 border border-rose-100 rounded-xl focus:ring-1 focus:ring-rose-300 focus:outline-none bg-rose-50/20">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-rose-800 mb-1">Author Name</label>
                    <input type="text" id="input-author" placeholder="Louzhen Family" class="w-full text-xs px-3.5 py-3 border border-rose-100 rounded-xl focus:ring-1 focus:ring-rose-300 focus:outline-none bg-rose-50/20">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-rose-800 mb-1">Note (Optional)</label>
                    <textarea id="input-note" placeholder="Write a memory..." rows="3" class="w-full text-xs px-3.5 py-3 border border-rose-100 rounded-xl focus:ring-1 focus:ring-rose-300 focus:outline-none bg-rose-50/20 resize-none"></textarea>
                </div>
            `;
            inputModal.classList.remove('hidden');
        });

        // Membuka modal form pengisian Playlist Baru
        bindEvent(btnAddPlaylist, () => {
            formType.value = "playlist";
            modalTitle.innerText = "Create Playlist";
            fieldContainer.innerHTML = `
                <div>
                    <label class="block text-xs font-semibold text-rose-800 mb-1">Playlist Name</label>
                    <input type="text" id="input-playlist-name" required placeholder="Autumn Mood" class="w-full text-xs px-3.5 py-3 border border-rose-100 rounded-xl focus:ring-1 focus:ring-rose-300 focus:outline-none bg-rose-50/20">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-rose-800 mb-1">Creator Name</label>
                    <input type="text" id="input-creator" placeholder="Zain" class="w-full text-xs px-3.5 py-3 border border-rose-100 rounded-xl focus:ring-1 focus:ring-rose-300 focus:outline-none bg-rose-50/20">
                </div>
            `;
            inputModal.classList.remove('hidden');
        });

        // Membuka modal form pengisian Lagu Baru ke Playlist Tertentu
        window.openAddTrackModal = function(playlistId, playlistName) {
            formType.value = "track";
            formExtraId.value = playlistId;
            modalTitle.innerText = `Add Song to ${playlistName}`;
            fieldContainer.innerHTML = `
                <div>
                    <label class="block text-xs font-semibold text-rose-800 mb-1">Song Title</label>
                    <input type="text" id="input-track-name" required placeholder="Autumn Breeze" class="w-full text-xs px-3.5 py-3 border border-rose-100 rounded-xl focus:ring-1 focus:ring-rose-300 focus:outline-none bg-rose-50/20">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-rose-800 mb-1">Audio Audio URL (.mp3 / .ogg)</label>
                    <input type="url" id="input-audio-url" required placeholder="https://example.com/audio.mp3" class="w-full text-xs px-3.5 py-3 border border-rose-100 rounded-xl focus:ring-1 focus:ring-rose-300 focus:outline-none bg-rose-50/20">
                </div>
            `;
            inputModal.classList.remove('hidden');
        };

        // Tutup Modal
        bindEvent(btnCloseModal, () => {
            inputModal.classList.add('hidden');
        });

        // Handle Form Submit
        vaultForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            try {
                if (formType.value === "photo") {
                    const imgUrl = document.getElementById('input-image-url').value;
                    const author = document.getElementById('input-author').value || 'Anonymous';
                    const note = document.getElementById('input-note').value;

                    const { error } = await supabase
                        .from('photos')
                        .insert([{ image_url: imgUrl, author_name: author, note: note }]);

                    if (error) throw error;
                    renderPhotos();

                } else if (formType.value === "playlist") {
                    const plName = document.getElementById('input-playlist-name').value;
                    const creator = document.getElementById('input-creator').value || 'Anonymous';

                    const { error } = await supabase
                        .from('playlists')
                        .insert([{ name: plName, creator_name: creator }]);

                    if (error) throw error;
                    renderPlaylists();

                } else if (formType.value === "track") {
                    const trackName = document.getElementById('input-track-name').value;
                    const audioUrl = document.getElementById('input-audio-url').value;
                    const plId = parseInt(formExtraId.value);

                    const { error } = await supabase
                        .from('tracks')
                        .insert([{ playlist_id: plId, name: trackName, audio_url: audioUrl }]);

                    if (error) throw error;
                    renderPlaylists();
                }

                // Tutup modal setelah sukses input
                inputModal.classList.add('hidden');
                vaultForm.reset();

            } catch (err) {
                alert("Database insert error! Check your connection.");
                console.error(err);
            }
        });


        // ==========================================
        // 9. FIRST PAGE LOAD INITIALIZATION
        // ==========================================
        window.addEventListener('DOMContentLoaded', () => {
            renderPhotos();
        });

    </script>
</body>
</html>
