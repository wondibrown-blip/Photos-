<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photos & Music Vault</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        .ios-blur { backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); }
        .lightbox-transition { transition: opacity 0.25s ease, transform 0.25s ease; }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin 12s linear infinite;
        }
    </style>
</head>
<body class="bg-white text-black min-h-screen flex flex-col justify-between overflow-hidden select-none">

    <!-- MAIN APP: PHOTOS TAB -->
    <div id="tab-photos-view" class="flex-1 flex flex-col h-full overflow-hidden">
        <header class="px-4 pt-6 pb-3 sticky top-0 bg-white/80 ios-blur z-40 border-b border-gray-100 flex justify-between items-end">
            <div onclick="registerSecretTap()" class="cursor-pointer text-left">
                <h1 class="text-3xl font-black tracking-tight text-gray-950">Photos</h1>
            </div>
            <label id="dev-add-photo-btn" class="text-sm font-semibold text-blue-500 cursor-pointer active:opacity-50 hidden">
                Add <input type="file" id="upload-photo-input" accept="image/*" class="hidden" onchange="handlePhotoUpload(this)">
            </label>
        </header>

        <!-- Scrollable Gallery Area -->
        <main class="flex-1 overflow-y-auto p-0.5 pb-28">
            <div id="gallery-grid" class="grid grid-cols-3 gap-0.5"></div>
        </main>
    </div>

    <!-- MAIN APP: PLAYLIST TAB -->
    <div id="tab-playlist-view" class="flex-1 flex flex-col h-full overflow-hidden hidden">
        <header class="px-4 pt-6 pb-3 sticky top-0 bg-white/80 ios-blur z-40 border-b border-gray-100 flex justify-between items-end">
            <div onclick="registerSecretTap()" class="cursor-pointer text-left">
                <h1 class="text-3xl font-black tracking-tight text-gray-950">Musicaholic</h1>
            </div>
            <button id="dev-create-playlist-btn" onclick="triggerCreatePlaylistModal()" class="text-sm font-bold bg-blue-500 text-white px-4 py-1.5 rounded-full shadow-md active:scale-95 transition-transform hidden">New Playlist</button>
        </header>

        <!-- Premium Modern Media Grid -->
        <main class="flex-1 overflow-y-auto px-4 pt-6 pb-32">
            <div id="playlist-container" class="grid grid-cols-2 gap-x-4 gap-y-6">
                <!-- Rendered playlists cards -->
            </div>
        </main>
    </div>

    <!-- MODERN PREMIUM FULLSCREEN PLAYLIST VIEW -->
    <div id="playlist-detail-view" class="fixed inset-0 bg-white z-40 hidden flex flex-col overflow-hidden">
        <!-- Floating Navigation Header -->
        <header class="px-4 pt-6 pb-3 flex justify-between items-center border-b border-gray-100 bg-white/80 ios-blur sticky top-0 z-50">
            <button onclick="closePlaylistDetail()" class="text-blue-500 font-semibold text-sm flex items-center bg-gray-50 px-3 py-1.5 rounded-full active:opacity-60 space-x-1">
                <svg class="w-4 h-4 stroke-current fill-none" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                <span>Back</span>
            </button>
            <h2 id="detail-playlist-title" class="text-sm font-bold tracking-tight text-gray-900 truncate max-w-[150px]">Playlist</h2>
            <label id="dev-add-track-btn" class="text-xs font-bold bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full cursor-pointer active:opacity-60 transition-opacity hidden">
                + Audio File <input type="file" id="upload-audio-input" accept="audio/*" class="hidden" onchange="handleAudioUpload(this)">
            </label>
        </header>

        <!-- Main Fullscreen Dynamic Body -->
        <div class="flex-1 overflow-y-auto p-5 pb-36 bg-gradient-to-b from-zinc-50 via-white to-white">
            <div class="flex flex-col items-center text-center mt-4 mb-8 relative">
                <button id="playlist-delete-btn" onclick="triggerPlaylistDeleteConfirmation()" class="absolute -top-2 left-0 text-[10px] bg-red-50 text-red-500 px-2.5 py-1 rounded-full font-bold tracking-wider uppercase border border-red-100 hidden">Delete</button>
                
                <!-- Premium Centered Art Showcase (Vinyl Record Style) -->
                <div id="main-vinyl-disc" class="w-44 h-44 bg-gradient-to-br from-zinc-900 via-zinc-800 to-black rounded-full shadow-2xl flex flex-col items-center justify-center relative border-4 border-zinc-950 mb-5 ring-8 ring-zinc-100/50">
                    <!-- Vinyl Grooves -->
                    <div class="absolute inset-4 border border-zinc-700/30 rounded-full"></div>
                    <div class="absolute inset-8 border border-zinc-700/20 rounded-full"></div>
                    <div class="absolute inset-12 border border-zinc-700/10 rounded-full"></div>
                    <!-- Center Label -->
                    <div class="w-14 h-14 bg-blue-500 rounded-full flex items-center justify-center shadow-inner">
                        <div class="w-3 h-3 bg-white rounded-full"></div>
                    </div>
                </div>
                
                <h3 id="detail-header-title" class="text-2xl font-black text-zinc-950 tracking-tight px-4 truncate max-w-full"></h3>
                <p id="detail-header-meta" class="text-xs text-zinc-400 mt-1.5 font-semibold tracking-wide uppercase"></p>
                
                <!-- Control Dashboard -->
                <div class="flex space-x-3 mt-6 w-full max-w-xs px-2">
                    <button onclick="playPlaylistContext(false)" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-xl text-xs flex items-center justify-center space-x-2 shadow-sm active:scale-95 transition-transform">
                        <svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <span>Play</span>
                    </button>
                    <button onclick="playPlaylistContext(true)" class="flex-1 bg-zinc-100 text-zinc-800 font-bold py-3 px-4 rounded-xl text-xs flex items-center justify-center space-x-2 active:scale-95 transition-transform">
                        <svg class="w-4 h-4 stroke-current fill-none" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20l7-7M21 3L4 20M15 19h6v-6"/></svg>
                        <span>Shuffle</span>
                    </button>
                </div>
            </div>

            <!-- Sleek iOS Tracklist Design -->
            <div class="w-full max-w-md mx-auto text-left">
                <p class="text-[10px] font-black uppercase text-zinc-400 tracking-wider mb-2 px-1">Audio Tracks</p>
                <div id="detail-tracks-list" class="divide-y divide-zinc-100 border border-zinc-100 rounded-2xl overflow-hidden bg-white shadow-sm"></div>
            </div>
        </div>
    </div>

    <!-- INTERACTIVE LIGHTBOX VAULT -->
    <div id="lightbox" class="fixed inset-0 bg-white z-50 hidden flex flex-col justify-between" ontouchstart="handleTouchStart(event)" ontouchend="handleTouchEnd(event)">
        <header class="p-4 flex justify-between items-center bg-white/90 ios-blur border-b border-gray-100 z-50">
            <button onclick="closeLightbox()" class="text-blue-500 font-semibold text-sm flex items-center bg-gray-50 px-2.5 py-1.5 rounded-full active:opacity-60">
                <svg class="w-4 h-4 stroke-current fill-none" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <div class="text-center">
                <span id="lightbox-index-title" class="text-xs font-bold text-gray-400 tracking-wide uppercase">Image</span>
            </div>
            <button id="photo-delete-btn" onclick="triggerPhotoDeleteConfirmation()" class="text-red-500 active:opacity-50 hidden px-2 py-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
        </header>
        
        <div class="flex-1 flex items-center justify-center overflow-hidden bg-gray-50 relative p-4">
            <img id="lightbox-img" src="" class="max-w-full max-h-[70vh] object-contain shadow-sm select-none pointer-events-none lightbox-transition">
        </div>

        <footer class="p-4 bg-white/90 ios-blur border-t border-gray-100 flex flex-col items-center space-y-3 z-50">
            <div class="flex w-full justify-between max-w-sm px-2 text-xs">
                <button onclick="toggleMetadataView()" class="text-gray-500 font-semibold mr-auto flex items-center space-x-1 bg-gray-50 px-3 py-1.5 rounded-full active:bg-gray-100"><span>ⓘ</span> <span>Details</span></button>
            </div>

            <div id="metadata-sheet" class="w-full max-w-sm bg-gray-50 rounded-2xl p-4 border border-gray-100 hidden text-left font-sans">
                <h4 class="text-xs font-black text-gray-400 uppercase tracking-wider mb-2.5">File Info</h4>
                <div class="space-y-2 text-xs text-gray-700">
                    <div class="flex justify-between"><span class="text-gray-400">Uploaded By:</span> <span id="meta-author" class="font-bold text-gray-900"></span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Date Added:</span> <span id="meta-date" class="font-medium"></span></div>
                    <div class="border-t border-gray-200/60 my-2 pt-2">
                        <span class="text-gray-400 block mb-1">Note:</span>
                        <p id="meta-caption" class="text-zinc-800 font-medium bg-white p-2 rounded-lg border border-zinc-100 min-h-[32px] break-words"></p>
                        <span id="meta-caption-hint" class="text-[9px] text-zinc-400 italic mt-1 block hidden">💡 Tap here to edit</span>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <!-- GLOBAL AUDIO PLAYER ENGINE -->
    <div id="global-music-player-bar" class="fixed bottom-20 left-4 right-4 max-w-md mx-auto bg-zinc-950 text-white rounded-2xl p-3 shadow-2xl flex items-center justify-between z-40 hidden transition-all duration-300">
        <div class="flex items-center space-x-3 truncate">
            <div id="bar-vinyl" class="w-10 h-10 bg-zinc-900 border border-zinc-800 rounded-xl flex items-center justify-center text-xs shadow-inner text-blue-500">
                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
            </div>
            <div class="truncate pr-2 text-left">
                <p id="global-player-title" class="text-xs font-bold truncate mt-1">Track Name</p>
            </div>
        </div>
        <div class="flex items-center space-x-4 pr-1">
            <button onclick="nextTrack()" class="text-lg active:opacity-50 text-gray-300">
                <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button onclick="toggleGlobalAudio()" id="global-play-btn" class="w-9 h-9 bg-white text-black rounded-full flex items-center justify-center font-bold text-sm shadow-md active:scale-90 transition-transform">
                <svg id="global-play-icon" class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
        </div>
    </div>

    <!-- FIXED MAIN TAB BAR -->
    <nav id="app-main-tabbar" class="fixed bottom-0 left-0 right-0 bg-white/80 ios-blur border-t border-gray-200 pt-2 pb-6 px-16 flex justify-between items-center z-40">
        <button onclick="switchTab('photos')" id="nav-photos" class="flex flex-col items-center text-blue-500">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M4 4h7v7H4V4zm0 9h7v7H4v-7zm9-9h7v7h-7V4zm0 9h7v7h-7v-7z"/></svg>
            <span class="text-[10px] font-bold mt-0.5">Photos</span>
        </button>
        <button onclick="switchTab('playlist')" id="nav-playlist" class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
            <span class="text-[10px] font-bold mt-0.5">Musicaholic</span>
        </button>
    </nav>

    <!-- PREMIUM INTERACTIVE CUSTOM DIALOG MODALS -->
    <div id="custom-modal-container" class="fixed inset-0 bg-zinc-950/40 backdrop-blur-sm z-50 flex items-center justify-center p-6 hidden">
        <div id="modal-input-card" class="bg-white rounded-2xl max-w-xs w-full p-5 shadow-xl text-center flex flex-col hidden animate-fadeIn scale-95 transition-transform duration-200">
            <h3 id="modal-input-title" class="text-sm font-bold text-zinc-900 mb-1">Name</h3>
            <p id="modal-input-sub" class="text-[11px] text-zinc-400 font-medium mb-3">Please specify a name to authorize credentials.</p>
            <input type="text" id="modal-text-input" class="w-full bg-zinc-50 border border-zinc-200 rounded-xl px-3 py-2 text-xs text-zinc-900 focus:outline-none focus:border-zinc-400 font-semibold mb-4 text-left" placeholder="Type here...">
            <div class="flex space-x-2 text-xs font-bold">
                <button onclick="closeCustomModal()" class="flex-1 py-2.5 bg-zinc-100 text-zinc-700 rounded-xl active:opacity-70">Cancel</button>
                <button id="modal-input-confirm-btn" class="flex-1 py-2.5 bg-blue-500 text-white rounded-xl active:opacity-70">Confirm</button>
            </div>
        </div>
        <div id="modal-confirm-card" class="bg-white rounded-2xl max-w-xs w-full p-5 shadow-xl text-center flex flex-col hidden animate-fadeIn scale-95 transition-transform duration-200">
            <h3 id="modal-confirm-title" class="text-sm font-bold text-zinc-900 mb-1">Delete Item</h3>
            <p id="modal-confirm-sub" class="text-[11px] text-zinc-400 font-medium mb-4">Are you absolutely sure you want to permanently delete this?</p>
            <div class="flex space-x-2 text-xs font-bold">
                <button onclick="closeCustomModal()" class="flex-1 py-2.5 bg-zinc-100 text-zinc-700 rounded-xl active:opacity-70">Cancel</button>
                <button id="modal-action-confirm-btn" class="flex-1 py-2.5 bg-red-500 text-white rounded-xl active:opacity-70">Delete</button>
            </div>
        </div>
    </div>

    <audio id="global-audio-engine" preload="auto"></audio>

    <script>
        // ==========================================
        // CONFIGURATION: INSERT YOUR SUPABASE DATA
        // ==========================================
        const SUPABASE_URL = "https://fhfjfwplicgzpbtncjyw.supabase.co/rest/v1/"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZoZmpmd3BsaWNnenBidG5janl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzkwMTMsImV4cCI6MjA5OTU1NTAxM30.6-_O92a3w83OqYZDh-N2twnZOF6yFi8YdOQSM5jO4lA";

        const headers = {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`
        };

        let photos = [];
        let playlists = [];
        let currentPhotoIndex = null;
        let activePlaylistId = null;
        let audioQueue = [];
        let currentQueueIndex = 0;
        let isShuffle = false;
        let touchStartX = 0;

        let secretTapCount = 0;
        let secretTapTimer = null;
        let isDeveloperUnlocked = false; 
        let currentUserName = "Profile"; 

        const audioEngine = document.getElementById('global-audio-engine');

        if (window.Telegram && window.Telegram.WebApp) {
            const webapp = window.Telegram.WebApp;
            webapp.ready();
            webapp.expand();
        } 

        function registerSecretTap() {
            secretTapCount++;
            clearTimeout(secretTapTimer);
            secretTapTimer = setTimeout(() => { secretTapCount = 0; }, 2000);

            if (secretTapCount >= 10) {
                secretTapCount = 0;
                
                if (!isDeveloperUnlocked) {
                    openInputModal("Ya congrats", "Your name:", (val) => {
                        if (val && val.trim() !== "") {
                            currentUserName = val.trim();
                            isDeveloperUnlocked = true;
                            applySecretPermissions();
                        }
                    });
                } else {
                    isDeveloperUnlocked = false;
                    currentUserName = "Profile";
                    applySecretPermissions();
                }
            }
        }

        function applySecretPermissions() {
            const addPhotoBtn = document.getElementById('dev-add-photo-btn');
            const createPlaylistBtn = document.getElementById('dev-create-playlist-btn');
            const addTrackBtn = document.getElementById('dev-add-track-btn');
            const deletePlaylistBtn = document.getElementById('playlist-delete-btn');
            const deletePhotoBtn = document.getElementById('photo-delete-btn');

            if (isDeveloperUnlocked) {
                addPhotoBtn?.classList.remove('hidden');
                createPlaylistBtn?.classList.remove('hidden');
                addTrackBtn?.classList.remove('hidden');
                if (activePlaylistId) deletePlaylistBtn?.classList.remove('hidden');
                if (currentPhotoIndex !== null) deletePhotoBtn?.classList.remove('hidden');
            } else {
                addPhotoBtn?.classList.add('hidden');
                createPlaylistBtn?.classList.add('hidden');
                addTrackBtn?.classList.add('hidden');
                deletePlaylistBtn?.classList.add('hidden');
                deletePhotoBtn?.classList.add('hidden');
            }
            if(currentPhotoIndex !== null) refreshLightboxContent();
        }

        function openInputModal(title, sub, callback) {
            const container = document.getElementById('custom-modal-container');
            const inputCard = document.getElementById('modal-input-card');
            const confirmCard = document.getElementById('modal-confirm-card');
            const textInput = document.getElementById('modal-text-input');
            const confirmBtn = document.getElementById('modal-input-confirm-btn');

            confirmCard.classList.add('hidden');
            inputCard.classList.remove('hidden');
            container.classList.remove('hidden');
            
            document.getElementById('modal-input-title').innerText = title;
            document.getElementById('modal-input-sub').innerText = sub;
            textInput.value = "";
            textInput.focus();

            confirmBtn.onclick = () => {
                callback(textInput.value);
                closeCustomModal();
            };
        }

        function openConfirmModal(title, sub, buttonText, callback) {
            const container = document.getElementById('custom-modal-container');
            const inputCard = document.getElementById('modal-input-card');
            const confirmCard = document.getElementById('modal-confirm-card');
            const actionBtn = document.getElementById('modal-action-confirm-btn');

            inputCard.classList.add('hidden');
            confirmCard.classList.remove('hidden');
            container.classList.remove('hidden');

            document.getElementById('modal-confirm-title').innerText = title;
            document.getElementById('modal-confirm-sub').innerText = sub;
            actionBtn.innerText = buttonText;

            actionBtn.onclick = () => {
                callback();
                closeCustomModal();
            };
        }

        function closeCustomModal() {
            document.getElementById('custom-modal-container').classList.add('hidden');
        }

        // ==========================================
        // DATABASE READ/WRITE LOGIC via Supabase REST
        // ==========================================
        window.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        async function loadData() {
            try {
                // Fetch Photos
                const resPhotos = await fetch(`${SUPABASE_URL}/rest/v1/photos?select=*&order=created_at.desc`, { headers });
                photos = await resPhotos.json();
                renderPhotos();

                // Fetch Playlists with relational Track mapping
                const resPlaylists = await fetch(`${SUPABASE_URL}/rest/v1/playlists?select=*,tracks(*)&order=created_at.desc`, { headers });
                playlists = await resPlaylists.json();
                renderPlaylists();

                if (currentPhotoIndex !== null) refreshLightboxContent();
                if (activePlaylistId) refreshPlaylistDetailView();
            } catch (err) {
                console.error("Error connecting to Supabase database:", err);
            }
        }

        function switchTab(tab) {
            closeLightbox(); 
            document.getElementById('tab-photos-view').classList.toggle('hidden', tab !== 'photos');
            document.getElementById('tab-playlist-view').classList.toggle('hidden', tab !== 'playlist');
            document.getElementById('nav-photos').className = tab === 'photos' ? "flex flex-col items-center text-blue-500" : "flex flex-col items-center text-gray-400";
            document.getElementById('nav-playlist').className = tab === 'playlist' ? "flex flex-col items-center text-blue-500" : "flex flex-col items-center text-gray-400";
        }

        // ==========================================
        // FILE UPLOAD AND STORAGE HANDLING
        // ==========================================
        async function uploadFileToSupabase(bucket, file) {
            const fileName = `${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
            const uploadUrl = `${SUPABASE_URL}/storage/v1/object/${bucket}/${fileName}`;

            const uploadHeaders = {
                ...headers,
                "Content-Type": file.type
            };

            const uploadRes = await fetch(uploadUrl, {
                method: "POST",
                headers: uploadHeaders,
                body: file
            });

            if (!uploadRes.ok) throw new Error("File upload block failed");

            // Build public asset CDN URL
            return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${fileName}`;
        }

        async function handlePhotoUpload(input) {
            if (!isDeveloperUnlocked) return;
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];

            try {
                // 1. Upload raw photo to "photos" storage bucket
                const publicUrl = await uploadFileToSupabase("Photos", file);

                // 2. Insert reference to database
                const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/Photos`, {
                    method: "POST",
                    headers: { ...headers, "Content-Type": "application/json", "Prefer": "return=representation" },
                    body: JSON.stringify({
                        storage_path: publicUrl,
                        note: "",
                        author_name: currentUserName,
                        date_added: new Date().toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' })
                    })
                });

                if (insertRes.ok) loadData();
            } catch (e) {
                console.error("Photo transaction failed:", e);
                alert("Upload failed. Make sure your bucket allows uploads!");
            }
        }

        function renderPhotos() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            photos.forEach((p, index) => {
                const item = document.createElement('div');
                item.className = "relative aspect-square bg-gray-100 overflow-hidden cursor-pointer active:opacity-80 transition-all";
                item.innerHTML = `<img src="${p.storage_path}" class="w-full h-full object-cover">`;
                item.onclick = () => openLightbox(index);
                grid.appendChild(item);
            });
        }

        function openLightbox(idx) {
            currentPhotoIndex = idx;
            const imgEl = document.getElementById('lightbox-img');
            imgEl.style.opacity = '0';
            imgEl.style.transform = 'scale(0.92)';
            document.getElementById('lightbox').classList.remove('hidden');
            document.getElementById('app-main-tabbar').classList.add('hidden');

            setTimeout(() => {
                refreshLightboxContent();
                imgEl.style.opacity = '1';
                imgEl.style.transform = 'scale(1)';
            }, 50);
        }

        function refreshLightboxContent() {
            if (currentPhotoIndex === null || !photos[currentPhotoIndex]) return;
            const photo = photos[currentPhotoIndex];
            document.getElementById('lightbox-img').src = photo.storage_path;
            
            const total = photos.length;
            const displayIndex = currentPhotoIndex + 1;
            document.getElementById('lightbox-index-title').innerText = `${displayIndex} of ${total}`;
            document.getElementById('meta-author').innerText = photo.author_name;
            document.getElementById('meta-date').innerText = photo.date_added || "N/A";
            
            const captionEl = document.getElementById('meta-caption');
            const hintEl = document.getElementById('meta-caption-hint');
            captionEl.innerText = photo.note && photo.note.trim() !== "" ? photo.note : "...";
            
            if (isDeveloperUnlocked) {
                hintEl.classList.remove('hidden');
                captionEl.className = "text-zinc-800 font-medium bg-zinc-100 p-2 rounded-lg border border-zinc-200 min-h-[32px] break-words cursor-pointer active:bg-zinc-200 text-left";
                captionEl.onclick = () => {
                    openInputModal("Edit Caption", "Edit:", async (newNote) => {
                        const patchRes = await fetch(`${SUPABASE_URL}/rest/v1/photos?id=eq.${photo.id}`, {
                            method: "PATCH",
                            headers: { ...headers, "Content-Type": "application/json" },
                            body: JSON.stringify({ note: newNote })
                        });
                        if (patchRes.ok) loadData();
                    });
                };
            } else {
                hintEl.classList.add('hidden');
                captionEl.className = "text-zinc-800 font-medium bg-white p-2 rounded-lg border border-zinc-100 min-h-[32px] break-words text-left";
                captionEl.onclick = null;
            }

            const deleteBtn = document.getElementById('photo-delete-btn');
            if (isDeveloperUnlocked) {
                deleteBtn.classList.remove('hidden');
            } else {
                deleteBtn.classList.add('hidden');
            }
        }

        function closeLightbox() {
            currentPhotoIndex = null;
            document.getElementById('lightbox').classList.add('hidden');
            document.getElementById('app-main-tabbar').classList.remove('hidden');
        }

        function handleTouchStart(e) { touchStartX = e.touches[0].clientX; }
        function handleTouchEnd(e) {
            let touchEndX = e.changedTouches[0].clientX;
            const imgEl = document.getElementById('lightbox-img');
            const swipeDistance = 60;

            if (touchStartX - touchEndX > swipeDistance) { 
                if (currentPhotoIndex < photos.length - 1) {
                    imgEl.style.opacity = '0';
                    imgEl.style.transform = 'translateX(-20px) scale(0.95)';
                    setTimeout(() => {
                        currentPhotoIndex++;
                        refreshLightboxContent();
                        imgEl.style.transform = 'translateX(0px) scale(1)';
                        imgEl.style.opacity = '1';
                    }, 150);
                }
            }
            if (touchEndX - touchStartX > swipeDistance) { 
                if (currentPhotoIndex > 0) {
                    imgEl.style.opacity = '0';
                    imgEl.style.transform = 'translateX(20px) scale(0.95)';
                    setTimeout(() => {
                        currentPhotoIndex--;
                        refreshLightboxContent();
                        imgEl.style.transform = 'translateX(0px) scale(1)';
                        imgEl.style.opacity = '1';
                    }, 150);
                }
            }
        }

        function triggerPhotoDeleteConfirmation() {
            openConfirmModal("Delete Photo", "Are you sure you want to delete this photo permanently?", "Delete", async () => {
                const photo = photos[currentPhotoIndex];
                const deleteRes = await fetch(`${SUPABASE_URL}/rest/v1/photos?id=eq.${photo.id}`, {
                    method: "DELETE",
                    headers
                });
                if (deleteRes.ok) {
                    closeLightbox();
                    loadData();
                }
            });
        }

        function toggleMetadataView() {
            document.getElementById('metadata-sheet').classList.toggle('hidden');
        }

        // ==========================================
        // PLAYLIST AND MUSIC LOGIC
        // ==========================================
        function triggerCreatePlaylistModal() {
            openInputModal("New Playlist", "Enter a name for your new playlist:", async (name) => {
                if (!name || name.trim() === "") return;
                const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/playlists`, {
                    method: "POST",
                    headers: { ...headers, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: name.trim(),
                        creator_name: currentUserName
                    })
                });
                if (insertRes.ok) loadData();
            });
        }

        function renderPlaylists() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = '';
            playlists.forEach(pl => {
                const card = document.createElement('div');
                card.className = "flex flex-col group cursor-pointer active:opacity-75 transition-all duration-150";
                card.innerHTML = `
                    <div class="w-full aspect-square bg-gradient-to-br from-zinc-900 via-zinc-800 to-black rounded-2xl flex flex-col items-center justify-center text-white shadow-md relative overflow-hidden mb-2 border border-zinc-200/5">
                        <div class="w-6 h-6 border-2 border-zinc-700 rounded-full opacity-40"></div>
                        <div class="absolute bottom-2.5 right-2.5 bg-black/40 backdrop-blur-md px-2 py-0.5 rounded-md text-[9px] font-black tracking-wider uppercase text-zinc-300">
                            ${pl.tracks ? pl.tracks.length : 0} Tracks
                        </div>
                    </div>
                    <div class="text-left px-0.5">
                        <h3 class="text-xs font-bold text-zinc-950 truncate leading-snug tracking-tight">${pl.name}</h3>
                        <p class="text-[10px] text-zinc-400 truncate font-semibold mt-0.5">By ${pl.creator_name}</p>
                    </div>
                `;
                card.onclick = () => openPlaylistDetail(pl.id);
                container.appendChild(card);
            });
        }

        function openPlaylistDetail(playlistId) {
            activePlaylistId = playlistId;
            document.getElementById('app-main-tabbar').classList.add('hidden');
            refreshPlaylistDetailView();
            document.getElementById('playlist-detail-view').classList.remove('hidden');
        }

        function closePlaylistDetail() {
            activePlaylistId = null;
            document.getElementById('playlist-detail-view').classList.add('hidden');
            document.getElementById('app-main-tabbar').classList.remove('hidden');
        }

        function refreshPlaylistDetailView() {
            if (!activePlaylistId) return;
            const pl = playlists.find(p => p.id === activePlaylistId);
            if (!pl) return;

            document.getElementById('detail-playlist-title').innerText = pl.name;
            document.getElementById('detail-header-title').innerText = pl.name;
            document.getElementById('detail-header-meta').innerText = `By ${pl.creator_name} — ${pl.tracks ? pl.tracks.length : 0} Tracks`;

            const deletePlBtn = document.getElementById('playlist-delete-btn');
            if (isDeveloperUnlocked) {
                deletePlBtn.classList.remove('hidden');
                document.getElementById('dev-add-track-btn').classList.remove('hidden');
            } else {
                deletePlBtn.classList.add('hidden');
                document.getElementById('dev-add-track-btn').classList.add('hidden');
            }

            // Sync Vinyl Rotator State
            const mainVinyl = document.getElementById('main-vinyl-disc');
            const isPlayingThisPlaylist = !audioEngine.paused && audioQueue.length > 0 && pl.tracks.some(t => t.id === audioQueue[currentQueueIndex]?.id);
            if (isPlayingThisPlaylist) {
                mainVinyl?.classList.add('animate-spin-slow');
            } else {
                mainVinyl?.classList.remove('animate-spin-slow');
            }

            // Render Tracks list
            const tracksContainer = document.getElementById('detail-tracks-list');
            tracksContainer.innerHTML = '';
            if (!pl.tracks || pl.tracks.length === 0) {
                tracksContainer.innerHTML = `<p class="p-6 text-zinc-400 text-xs text-center font-medium">No tracks in this playlist yet.</p>`;
            } else {
                pl.tracks.forEach((track, index) => {
                    const row = document.createElement('div');
                    row.className = "flex items-center justify-between p-3.5 hover:bg-zinc-50 cursor-pointer active:bg-zinc-100 transition-colors group";
                    const isCurrent = !audioEngine.paused && audioQueue[currentQueueIndex]?.id === track.id;
                    row.innerHTML = `
                        <div class="flex items-center space-x-3 truncate flex-1" onclick="playTrackDirectly(${index})">
                            <span class="text-xs font-bold ${isCurrent ? 'text-blue-500' : 'text-zinc-400'} w-4 text-center">${index + 1}</span>
                            <div class="truncate">
                                <p class="text-xs font-bold ${isCurrent ? 'text-blue-500' : 'text-zinc-800'} truncate">${track.name}</p>
                            </div>
                        </div>
                        ${isDeveloperUnlocked ? `
                        <button onclick="deleteTrack(${index})" class="text-red-500 opacity-0 group-hover:opacity-100 active:opacity-50 px-2 py-1 transition-opacity">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                        ` : ''}
                    `;
                    tracksContainer.appendChild(row);
                });
            }
        }

        async function handleAudioUpload(input) {
            if (!isDeveloperUnlocked || !activePlaylistId) return;
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];

            try {
                // 1. Upload audio track to "musicaholic" bucket
                const publicUrl = await uploadFileToSupabase("musicaholic", file);

                // 2. Insert metadata linking to current active playlist ID
                const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/tracks`, {
                    method: "POST",
                    headers: { ...headers, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        playlist_id: activePlaylistId,
                        name: file.name.replace(/\.[^/.]+$/, ""),
                        storage_path: publicUrl
                    })
                });

                if (insertRes.ok) loadData();
            } catch (e) {
                console.error("Audio transaction failed:", e);
                alert("Upload failed. Make sure your bucket allows uploads!");
            }
        }

        // ==========================================
        // CORE GLOBAL PLAYBACK CONTROLLERS
        // ==========================================
        function playPlaylistContext(shuffle = false) {
            const pl = playlists.find(p => p.id === activePlaylistId);
            if (!pl || !pl.tracks || pl.tracks.length === 0) return;

            isShuffle = shuffle;
            audioQueue = [...pl.tracks];
            if (shuffle) {
                audioQueue.sort(() => Math.random() - 0.5);
            }
            currentQueueIndex = 0;
            playCurrentQueueIndex();
        }

        function playTrackDirectly(index) {
            const pl = playlists.find(p => p.id === activePlaylistId);
            if (!pl) return;
            isShuffle = false;
            audioQueue = [...pl.tracks];
            currentQueueIndex = index;
            playCurrentQueueIndex();
        }

        function playCurrentQueueIndex() {
            if (audioQueue.length === 0 || !audioQueue[currentQueueIndex]) return;
            const track = audioQueue[currentQueueIndex];

            audioEngine.src = track.storage_path;
            audioEngine.play().then(() => {
                updateGlobalPlayerBar();
                refreshPlaylistDetailView();
            }).catch(e => console.log("Playback error: ", e));
        }

        function toggleGlobalAudio() {
            if (audioEngine.paused) {
                audioEngine.play();
            } else {
                audioEngine.pause();
            }
            updateGlobalPlayerBar();
            refreshPlaylistDetailView();
        }

        function nextTrack() {
            if (audioQueue.length === 0) return;
            currentQueueIndex = (currentQueueIndex + 1) % audioQueue.length;
            playCurrentQueueIndex();
        }

        audioEngine.onended = () => {
            nextTrack();
        };

        function updateGlobalPlayerBar() {
            const bar = document.getElementById('global-music-player-bar');
            const title = document.getElementById('global-player-title');
            const playIcon = document.getElementById('global-play-icon');
            const barVinyl = document.getElementById('bar-vinyl');

            if (audioQueue.length === 0 || !audioQueue[currentQueueIndex]) {
                bar.classList.add('hidden');
                return;
            }

            bar.classList.remove('hidden');
            title.innerText = audioQueue[currentQueueIndex].name;

            if (audioEngine.paused) {
                playIcon.innerHTML = `<svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
                barVinyl.classList.remove('animate-spin-slow');
            } else {
                playIcon.innerHTML = `<svg class="w-3.5 h-3.5 fill-current" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;
                barVinyl.classList.add('animate-spin-slow');
            }
        }

        function deleteTrack(trackIndex) {
            if (!isDeveloperUnlocked || !activePlaylistId) return;
            const pl = playlists.find(p => p.id === activePlaylistId);
            const track = pl.tracks[trackIndex];

            openConfirmModal("Delete Track", "Are you sure you want to remove this audio track?", "Delete", async () => {
                const deleteRes = await fetch(`${SUPABASE_URL}/rest/v1/tracks?id=eq.${track.id}`, {
                    method: "DELETE",
                    headers
                });
                if (deleteRes.ok) loadData();
            });
        }

        function triggerPlaylistDeleteConfirmation() {
            if (!activePlaylistId) return;
            openConfirmModal("Delete Playlist", "This will permanently remove this playlist and its audio vault items.", "Delete", async () => {
                const deleteRes = await fetch(`${SUPABASE_URL}/rest/v1/playlists?id=eq.${activePlaylistId}`, {
                    method: "DELETE",
                    headers
                });
                if (deleteRes.ok) {
                    closePlaylistDetail();
                    loadData();
                }
            });
        }
    </script>
</body>
</html>
